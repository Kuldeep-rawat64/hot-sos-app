<div class="pin-screen">
  <!-- Header -->
  <div class="pin-header">
    <h1 class="pin-title">Enter PIN</h1>
    <p class="pin-subtitle">Enter your 6-digit PIN to continue</p>
  </div>

  <!-- PIN Dots Display -->
  <div class="pin-dots">
    @for (dot of pinDots; track $index) {
      <span class="pin-dot" [class.pin-dot--filled]="$index < enteredPin.length"></span>
    }
  </div>

  <!-- Error Message -->
  @if (errorMessage) {
    <div class="pin-error">
      <span>{{ errorMessage }}</span>
    </div>
  }

  <!-- Numeric Keypad -->
  <div class="keypad">
    @for (digit of ['1', '2', '3', '4', '5', '6', '7', '8', '9']; track digit) {
      <button class="keypad-btn" (click)="onKeyPress(digit)">{{ digit }}</button>
    }
    <div class="keypad-btn keypad-btn--empty"></div>
    <button class="keypad-btn" (click)="onKeyPress('0')">0</button>
    <button class="keypad-btn keypad-btn--delete" (click)="onDelete()">
      <mat-icon>backspace</mat-icon>
    </button>
  </div>

  <!-- Continue Button -->
  <button class="btn-continue" [disabled]="pinForm.invalid || isLoading" (click)="onSubmit()">
    @if (!isLoading) {
      <span>Continue</span>
    }
    @if (isLoading) {
      <span>Verifying...</span>
    }
  </button>
</div>
